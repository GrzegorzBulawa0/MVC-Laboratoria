{% extends "wykaz_filmow/base.html" %}

{% block content %}
    <p>Czy na pewno chcesz usunąć tę ocenę?</p>

    <p><strong>{{ ocena.text }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn">Tak, usuń</button>
        <a href="{% url 'wykaz_filmow:film' film.id %}" class="btn">Anuluj</a>
    </form>
{% endblock content %}
